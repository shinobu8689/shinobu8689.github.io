<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Misc Projects — shinobu_works</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #EDEAE2; --panel: #E4E1D7; --ink: #151E1B; --teal-deep: #0E332E;
  --teal: #2C685D; --sage: #8FA396; --phosphor: #3FCB8E; --line: #B7C0B6;
  --amber: #C97F35; --card-screen: #0E332E;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Mono', monospace; background: var(--bg); min-height: 100vh; }
.main {
  min-height: 100vh;
  background-image: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size: 28px 28px; background-attachment: fixed; position: relative;
}
.grid-fade {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at 50% 0%, transparent 0%, var(--bg) 72%);
  pointer-events: none; z-index: 0;
}
.frame { position: relative; max-width: 900px; width: 100%; margin: 0 auto; padding: 0 32px 80px; z-index: 1; }

.topbar { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid var(--ink); }
.site-mark { font-size: 13px; font-weight: 500; letter-spacing: 0.06em; color: var(--teal-deep); }
.topbar-controls { display: flex; align-items: center; gap: 8px; }
.topbar-btn {
  background: transparent; border: 1px solid var(--ink); color: var(--ink);
  font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; letter-spacing: 0.1em;
  padding: 5px 11px; cursor: pointer; display: flex; align-items: center; gap: 5px;
  transition: background 0.15s, color 0.15s; line-height: 1;
}
.topbar-btn:hover { background: var(--ink); color: var(--bg); }
.icon-sun { display: none; } .icon-moon { display: inline; }
body.dark .icon-sun { display: inline; } body.dark .icon-moon { display: none; }

.nav-btn-wrap { position: relative; }
.nav-dropdown {
  display: none; position: absolute; top: calc(100% + 4px); right: 0;
  background: var(--panel); border: 1px solid var(--ink); padding: 4px; z-index: 90; min-width: 150px;
}
.nav-btn-wrap.open .nav-dropdown { display: block; }
.nav-dd-item {
  display: block; padding: 7px 12px; font-size: 10.5px; color: var(--ink);
  cursor: pointer; letter-spacing: 0.06em; text-decoration: none; white-space: nowrap;
  transition: background 0.1s, color 0.1s;
}
.nav-dd-item:hover { background: var(--teal-deep); color: var(--bg); }
.nav-dd-item.section { color: var(--phosphor); }

.file-header { margin-top: 40px; border: 1px solid var(--ink); background: var(--panel); position: relative; }
.file-header::before {
  content: ""; position: absolute; top: 8px; left: 8px; right: 8px; bottom: 8px;
  border: 1px dashed var(--sage); pointer-events: none; z-index: 0;
}
.hero-section { padding: 40px 32px 44px; position: relative; z-index: 1; }
.eyebrow { font-size: 10.5px; letter-spacing: 0.08em; color: var(--teal); margin-bottom: 16px; }
.eyebrow-back {
  display: inline-flex; align-items: center; text-decoration: none;
  font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--ink); border: 1px solid var(--ink);
  padding: 3px 9px; transition: background 0.15s, color 0.15s; vertical-align: middle; margin-right: 10px;
}
.eyebrow-back:hover { background: var(--ink); color: var(--bg); }
h1 {
  font-family: 'Space Grotesk', sans-serif; font-weight: 700;
  font-size: clamp(28px, 4.5vw, 50px); letter-spacing: -0.01em; color: var(--teal-deep); line-height: 1.05;
}
h1 .cursor {
  display: inline-block; width: 0.45ch; background: var(--phosphor);
  animation: blink 1s steps(1) infinite; margin-left: 3px; vertical-align: text-bottom;
}
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
.role-line { margin-top: 14px; font-family: 'Space Grotesk', sans-serif; font-size: clamp(13px, 1.6vw, 16px); color: var(--sage); }
.hero-divider { margin-top: 24px; height: 1px; background: repeating-linear-gradient(90deg, var(--ink) 0 5px, transparent 5px 10px); opacity: 0.4; }

.section-label {
  margin: 52px 0 20px; display: flex; align-items: center; gap: 12px;
  font-size: 10.5px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--teal-deep);
}
.section-label::after { content: ""; flex: 1; height: 1px; background: var(--ink); opacity: 0.4; }
.section-label .tri { color: var(--phosphor); }
.prose { font-size: 13px; color: var(--ink); line-height: 1.85; max-width: 700px; opacity: 0.8; }

/* misc sub-project cards */
.proj-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
.proj-card {
  border: 1px solid var(--ink); background: var(--panel);
  padding: 20px; display: flex; flex-direction: column; gap: 12px;
}
.proj-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.proj-card-icon {
  width: 30px; height: 30px; background: var(--card-screen);
  border: 1px solid rgba(63,203,142,0.25);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.proj-card-icon i { font-size: 15px; color: var(--phosphor); opacity: 0.55; }
.proj-card-links { display: flex; gap: 10px; flex-shrink: 0; align-items: center; }
.ext-link { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; letter-spacing: 0.08em; color: var(--teal); text-decoration: none; transition: color 0.12s; }
.ext-link:hover { color: var(--phosphor); }
.ext-link i { font-size: 11px; }
.proj-card-title { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 14px; color: var(--teal-deep); }
.proj-type-badge { font-size: 9px; color: var(--sage); letter-spacing: 0.06em; margin-top: 3px; }
.proj-card-desc { font-size: 11.5px; color: var(--ink); line-height: 1.7; opacity: 0.75; flex: 1; }
.proj-feature-list { display: flex; flex-direction: column; gap: 5px; }
.proj-feature-item { display: flex; gap: 8px; align-items: flex-start; }
.proj-feature-tri { color: var(--phosphor); font-size: 7.5px; flex-shrink: 0; margin-top: 4px; opacity: 0.55; }
.proj-feature-text { font-size: 10.5px; color: var(--sage); line-height: 1.65; }
.proj-tag-group { display: flex; flex-wrap: wrap; gap: 5px; margin-top: auto; padding-top: 4px; }
.tag { font-size: 9px; font-family: 'IBM Plex Mono', monospace; color: var(--teal); border: 1px solid var(--teal); padding: 2px 7px; letter-spacing: 0.06em; }

footer { margin-top: 64px; padding-top: 16px; border-top: 1px solid var(--ink); display: flex; justify-content: space-between; font-size: 9.5px; letter-spacing: 0.1em; color: var(--sage); }

body.dark {
  --bg: #0C1F1B; --panel: #112920; --ink: #B7C9C0; --teal-deep: #3FCB8E;
  --teal: #6BAFA0; --sage: #3D6055; --line: #1C3530; --card-screen: #071310;
}
body.dark .file-header { background: var(--panel); border-color: #2A4A40; }
body.dark .file-header::before { border-color: var(--sage); }
body.dark h1 { color: var(--teal-deep); }
body.dark .topbar { border-color: #2A4A40; }
body.dark .nav-dropdown { background: var(--panel); border-color: #2A4A40; }
body.dark .nav-dd-item { color: var(--ink); }
body.dark .nav-dd-item:hover { background: #1D4A3A; color: #EDEAE2; }
body.dark .proj-card { background: var(--panel); border-color: #2A4A40; }
body.dark .proj-card-title { color: var(--teal-deep); }
body.dark footer { border-color: #2A4A40; }

@media (max-width: 768px) {
  .frame { padding: 0 20px 60px; }
  .hero-section { padding: 26px 18px 30px; }
  .proj-grid { grid-template-columns: 1fr; }
  .topbar-btn { font-size: 9.5px; padding: 4px 8px; }
}
.jp-loading .main { visibility: hidden; }
</style>
</head>
<body data-page="works">
<script>(function(){var s=localStorage;if(s.getItem('sw_dark')==='1')document.body.classList.add('dark');if(s.getItem('sw_jp')==='1'){document.body.dataset.jp='1';document.body.classList.add('jp-loading');}})();</script>

<div class="main">
  <div class="grid-fade"></div>
  <div class="frame">

    <div class="topbar">
      <span class="site-mark">shinobu_works</span>
      <div class="topbar-controls">
        <div class="nav-btn-wrap" id="nav-btn-wrap">
          <button class="topbar-btn" onclick="toggleNavDropdown()">
            <i class="ti ti-layout-grid"></i><span>site</span>
          </button>
          <div class="nav-dropdown">
            <a class="nav-dd-item" href="../index.html" id="nav-home">home</a>
            <a class="nav-dd-item section" href="../projects.html" id="nav-works">works</a>
            <a class="nav-dd-item" href="../art.html" id="nav-art">art</a>
            <a class="nav-dd-item" href="../about.html" id="nav-about">about</a>
            <a class="nav-dd-item" href="../contact.html" id="nav-contact">contact</a>
          </div>
        </div>
        <button class="topbar-btn" onclick="toggleDark()">
          <i class="ti ti-moon icon-moon"></i>
          <i class="ti ti-sun icon-sun"></i>
        </button>
        <button class="topbar-btn" id="topbar-lang-btn" onclick="toggleLang()">日本語</button>
      </div>
    </div>

    <div class="file-header">
      <div class="hero-section">
        <div class="eyebrow"><a class="eyebrow-back" href="../projects.html">← back</a>shinobu_works/projects/misc</div>
        <h1 id="detail-title">Misc Projects<span class="cursor">&nbsp;</span></h1>
        <div class="role-line"><span id="detail-sub">Team exercises, coursework, and experiments.</span></div>
        <div class="hero-divider"></div>
        <div style="margin-top:16px;">
          <a class="ext-link" href="https://github.com/shinobu8689/s-portfolio/tree/main/UniversityProjects" target="_blank" style="font-size:10.5px;">github <i class="ti ti-arrow-up-right"></i></a>
        </div>
      </div>
    </div>

    <div class="section-label"><span class="tri">▸</span><span id="lbl-overview">OVERVIEW</span></div>
    <div class="prose" id="overview-text"></div>

    <div class="section-label"><span class="tri">▸</span><span id="lbl-projects">PROJECTS</span></div>
    <div class="proj-grid" id="proj-grid"></div>

    <footer>
      <span>© 2026 All rights reserved.</span>
      <span>shinobu_works</span>
    </footer>

  </div>
</div>

<script>
(function(){
  var dark = localStorage.getItem('sw_dark') === '1';
  var jp   = localStorage.getItem('sw_jp')   === '1';
  function applyLang(){
    var btn = document.getElementById('topbar-lang-btn');
    if(btn) btn.textContent = jp ? 'English' : '日本語';
    document.documentElement.lang = jp ? 'ja' : 'en';
    if(typeof window.onToggleLangContent === 'function') window.onToggleLangContent(jp);
  }
  window.toggleDark = function(){ dark=!dark; localStorage.setItem('sw_dark',dark?'1':'0'); document.body.classList.toggle('dark',dark); };
  window.toggleLang = function(){ jp=!jp; localStorage.setItem('sw_jp',jp?'1':'0'); document.body.dataset.jp=jp?'1':''; applyLang(); };
  window.toggleNavDropdown = function(){ document.getElementById('nav-btn-wrap').classList.toggle('open'); };
  document.addEventListener('click', function(e){ if(!e.target.closest('#nav-btn-wrap')){ var w=document.getElementById('nav-btn-wrap'); if(w) w.classList.remove('open'); } });
  setTimeout(function(){ if(jp) applyLang(); document.body.classList.remove('jp-loading'); }, 0);
})();
</script>

<script>
var DATA = {
  overview_en: 'A collection of smaller projects built through team collaborations, coursework, and personal experiments. These span web development, board game remakes, and mobile app development — each one a different context for learning.',
  overview_ja: 'チーム開発・授業・個人実験で作った小規模プロジェクトのまとめです。Web開発・ボードゲームのデジタル化・モバイルアプリ開発など、それぞれ異なる学習の場で取り組みました。',
  projects: [
    {
      icon: 'ti-layout-kanban',
      title: 'Kanban Board',
      title_ja: 'Kanban Board',
      type_en: 'Team Project',
      type_ja: 'チーム開発',
      desc_en: 'Built a web-based Kanban board with drag-and-drop task management and client-side persistence.',
      desc_ja: 'タスク管理や、ワークフロー操作を備えたWebベースのカンバンボードアプリをチームで開発。',
      features_en: ['Project management tools','Touch-friendly frontend UI','Supported Agile workflows'],
      features_ja: ['プロジェクト情報の管理機能','タッチでも操作しやすいUI','スプリントによるアジャイル開発'],
      tags: ['javascript','html / css','sqlite'],
      github: null
    },
    {
      icon: 'ti-chess',
      title: "Nine Men's Morris",
      title_ja: 'ナイン・メンズ・モリス',
      type_en: 'Solo (originally team)',
      type_ja: '個人完成（元チーム開発）',
      desc_en: "Recreated the board game Nine Men's Morris in PyGame with full game logic, UI interaction, and a beginner-friendly tutorial.",
      desc_ja: 'ボードゲーム「ナイン・メンズ・モリス」をPyGameでデジタル再現。ゲームロジックからUI操作まで実装し、初心者向けチュートリアルも含む完成版。',
      features_en: ['Fully playable end-to-end implementation','Turn handling, board validation, and input management'],
      features_ja: ['フルプレイ可能な完成版','ターン処理・盤面検証・入力管理'],
      tags: ['python','pygame'],
      github: null
    },
    {
      icon: 'ti-moon',
      title: 'Sleep Medication App',
      title_ja: '睡眠補助アプリ',
      type_en: 'Team Project',
      type_ja: 'チーム開発',
      desc_en: 'Developed an Android sleep assistance app as part of a team, implementing core features for sleep tracking and relaxation.',
      desc_ja: 'チームでAndroid向けの睡眠補助アプリを開発。睡眠記録・音楽再生機能などを実装し、モバイルの開発環境に詳しくなった。',
      features_en: ['Sleep-inducing music playback','Sleep log recording and viewing','Agile workflow with iterative feature delivery'],
      features_ja: ['入眠支援向けの音楽再生機能','睡眠ログの記録・閲覧機能','アジャイル開発環境で機能追加・改善'],
      tags: ['android','java'],
      github: null
    }
  ]
};

function buildCard(p, jp){
  var title = jp ? p.title_ja : p.title;
  var type  = jp ? p.type_ja  : p.type_en;
  var desc  = jp ? p.desc_ja  : p.desc_en;
  var feats = jp ? p.features_ja : p.features_en;

  var links = '';
  if(p.github) links += '<a class="ext-link" href="'+p.github+'" target="_blank">github <i class="ti ti-arrow-up-right"></i></a>';
  if(p.workshop) links += '<a class="ext-link" href="'+p.workshop+'" target="_blank">'+(jp?'workshop':'workshop')+' <i class="ti ti-arrow-up-right"></i></a>';

  var featsHtml = feats.map(function(f){
    return '<div class="proj-feature-item"><span class="proj-feature-tri">▸</span><span class="proj-feature-text">'+f+'</span></div>';
  }).join('');

  var tagsHtml = p.tags.map(function(t){ return '<span class="tag">'+t+'</span>'; }).join('');

  return '<div class="proj-card">'
    +'<div class="proj-card-header">'
    +'<div class="proj-card-icon"><i class="ti '+p.icon+'"></i></div>'
    +(links ? '<div class="proj-card-links">'+links+'</div>' : '')
    +'</div>'
    +'<div><div class="proj-card-title">'+title+'</div><div class="proj-type-badge">'+type+'</div></div>'
    +'<div class="proj-card-desc">'+desc+'</div>'
    +'<div class="proj-feature-list">'+featsHtml+'</div>'
    +'<div class="proj-tag-group">'+tagsHtml+'</div>'
    +'</div>';
}

function render(jp){
  document.getElementById('detail-title').childNodes[0].textContent = jp ? 'その他のプロジェクト' : 'Misc Projects';
  document.getElementById('detail-sub').textContent = jp ? 'チーム開発・授業課題・個人実験。' : 'Team exercises, coursework, and experiments.';
  document.getElementById('lbl-overview').textContent = jp ? '概要' : 'OVERVIEW';
  document.getElementById('overview-text').textContent = jp ? DATA.overview_ja : DATA.overview_en;
  document.getElementById('lbl-projects').textContent = jp ? 'プロジェクト' : 'PROJECTS';
  document.getElementById('proj-grid').innerHTML = DATA.projects.map(function(p){ return buildCard(p, jp); }).join('');

  document.getElementById('nav-home').textContent    = jp ? 'ホーム' : 'home';
  document.getElementById('nav-works').textContent   = jp ? '制作実績' : 'works';
  document.getElementById('nav-art').textContent     = jp ? 'イラスト' : 'art';
  document.getElementById('nav-about').textContent   = jp ? '自己紹介' : 'about';
  document.getElementById('nav-contact').textContent = jp ? 'お問い合わせ' : 'contact';
}

render(false);
window.onToggleLangContent = function(jp){ render(jp); };
</script>
</body>
</html>
