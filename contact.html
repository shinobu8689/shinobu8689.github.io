<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>contact — shinobu_works</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sidebar.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F5F3EE;min-height:100vh;display:flex;}

.main{flex:1;display:flex;flex-direction:column;}
.center-wrap{
  flex:1;display:flex;flex-direction:column;justify-content:center;
  gap:28px;max-width:560px;width:100%;margin:0 auto;padding:60px 40px;
}

.site-name{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:400;color:#7A7773;letter-spacing:0.06em;}
.page-title{font-size:26px;font-weight:500;color:#1A1917;line-height:1.35;}
.page-title span{font-weight:400;color:#7A7773;}
.divider{width:100%;height:0.5px;background:#C8C5BE;}
.section-label{font-size:11px;color:#9E9B95;letter-spacing:0.08em;text-transform:uppercase;}

.social-list{display:flex;flex-direction:column;gap:2px;}
.social-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;text-decoration:none;color:inherit;transition:background 0.12s;}
.social-item:hover{background:#EAE8E3;}
.social-item i{font-size:18px;color:#7A7773;flex-shrink:0;width:22px;}
.social-name{font-size:13px;font-weight:500;color:#1A1917;font-family:'IBM Plex Mono',monospace;}
.social-handle{font-size:11px;color:#B0ADA6;margin-left:auto;}
.social-arrow{font-size:13px;color:#C8C5BE;margin-left:6px;transition:color 0.12s;}
.social-item:hover .social-arrow{color:#7A7773;}

@media (max-width: 768px) {
  .center-wrap{padding:80px 24px 40px;justify-content:flex-start;}
  .page-title{font-size:22px;}
}

body.dark{background:#1C1B19;}
body.dark .site-name{color:#5C5A56;}
body.dark .page-title{color:#E8E6E1;}
body.dark .page-title span{color:#5C5A56;}
body.dark .divider{background:#2E2D2A;}
body.dark .section-label{color:#5C5A56;}
body.dark .social-item:hover{background:#1E1D1B;}
body.dark .social-item i{color:#5C5A56;}
body.dark .social-name{color:#E8E6E1;}
body.dark .social-handle{color:#3A3835;}
body.dark .social-arrow{color:#2E2D2A;}
body.dark .social-item:hover .social-arrow{color:#5C5A56;}
body.dark #resp-text{color:#5C5A56;}
</style>
</head>
<body data-page="contact">
<script>(function(){var s=localStorage;if(s.getItem('sw_dark')==='1')document.body.classList.add('dark');if(s.getItem('sw_jp')==='1'){document.body.dataset.jp='1';document.body.classList.add('jp-loading');}})();</script>

<div class="mock">
  <div class="main">
    <div class="center-wrap">
      <span class="site-name">shinobu_works</span>

      <a class="back-link" href="index.html">
        <i class="ti ti-arrow-left"></i>
        <span id="back-label">back to home</span>
      </a>

      <div class="page-title" id="page-title">
        find me here<br>
        <span id="page-sub">pick your platform.</span>
      </div>

      <div class="divider"></div>

      <div style="display:flex;flex-direction:column;gap:10px;">
        <div class="section-label" id="lbl-links">◤ links</div>
        <div class="social-list">
          <a class="social-item" href="mailto:your@email.com">
            <i class="ti ti-mail"></i>
            <span class="social-name">email</span>
            <span class="social-handle">your@email.com</span>
            <i class="ti ti-arrow-up-right social-arrow"></i>
          </a>
          <a class="social-item" href="#" target="_blank">
            <i class="ti ti-brand-github"></i>
            <span class="social-name">github</span>
            <span class="social-handle">@username</span>
            <i class="ti ti-arrow-up-right social-arrow"></i>
          </a>
          <a class="social-item" href="#" target="_blank">
            <i class="ti ti-brand-x"></i>
            <span class="social-name">twitter / x</span>
            <span class="social-handle">@username</span>
            <i class="ti ti-arrow-up-right social-arrow"></i>
          </a>
          <a class="social-item" href="#" target="_blank">
            <i class="ti ti-brand-linkedin"></i>
            <span class="social-name">linkedin</span>
            <span class="social-handle">your name</span>
            <i class="ti ti-arrow-up-right social-arrow"></i>
          </a>
        </div>
      </div>

      <div class="divider"></div>

      <div style="font-size:12px;color:#7A7773;line-height:1.8;" id="resp-text">
        usually within 1–2 days.<br>
        happy to chat about dev projects, freelance, or collabs.
      </div>

    </div>
  </div>
</div>

<script src="sidebar.js"></script>
<script>
window.onToggleLangContent=function(jp){
  document.getElementById('back-label').textContent=jp?'ホームへ':'back to home';
  document.getElementById('page-title').childNodes[0].textContent=jp?'よかったら連絡ください。\n':'find me here\n';
  document.getElementById('page-sub').textContent=jp?'':'pick your platform.';
  document.getElementById('lbl-links').textContent=jp?'◤ links':'◤ links';
  document.getElementById('resp-text').innerHTML=jp
    ?'通常1〜2日以内に返信します。<br>開発案件やフリーランスのご相談、お気軽にどうぞ。'
    :'usually within 1–2 days.<br>happy to chat about dev projects, freelance, or collabs.';
};
</script>
</body>
</html>
