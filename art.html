<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>art — shinobu_works</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #EDEAE2;
  --panel: #E4E1D7;
  --ink: #151E1B;
  --teal-deep: #0E332E;
  --teal: #2C685D;
  --sage: #8FA396;
  --phosphor: #3FCB8E;
  --phosphor-dim: #B7CFC2;
  --line: #B7C0B6;
  --amber: #C97F35;
  --card-screen: #0E332E;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'IBM Plex Mono', monospace;
  background: var(--bg);
  min-height: 100vh;
}

.main {
  min-height: 100vh;
  background-image:
    linear-gradient(var(--line) 1px, transparent 1px),
    linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size: 28px 28px;
  background-attachment: fixed;
  position: relative;
}

.grid-fade {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at 50% 0%, transparent 0%, var(--bg) 72%);
  pointer-events: none;
  z-index: 0;
}

.frame {
  position: relative;
  max-width: 900px;
  width: 100%;
  margin: 0 auto;
  padding: 0 32px 80px;
  z-index: 1;
}

/* ---- topbar ---- */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 0;
  border-bottom: 1px solid var(--ink);
}
.site-mark {
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.06em;
  color: var(--teal-deep);
}
.topbar-controls { display: flex; align-items: center; gap: 8px; }
.topbar-btn {
  background: transparent;
  border: 1px solid var(--ink);
  color: var(--ink);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10.5px;
  letter-spacing: 0.1em;
  padding: 5px 11px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: background 0.15s, color 0.15s;
  line-height: 1;
}
.topbar-btn:hover { background: var(--ink); color: var(--bg); }
.icon-sun { display: none; }
.icon-moon { display: inline; }
body.dark .icon-sun { display: inline; }
body.dark .icon-moon { display: none; }

/* ---- nav dropdown ---- */
.nav-btn-wrap { position: relative; }
.nav-dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 4px);
  right: 0;
  background: var(--panel);
  border: 1px solid var(--ink);
  padding: 4px;
  z-index: 90;
  min-width: 150px;
}
.nav-btn-wrap.open .nav-dropdown { display: block; }
.nav-dd-item {
  display: block;
  padding: 7px 12px;
  font-size: 10.5px;
  color: var(--ink);
  cursor: pointer;
  letter-spacing: 0.06em;
  text-decoration: none;
  white-space: nowrap;
  transition: background 0.1s, color 0.1s;
}
.nav-dd-item:hover { background: var(--teal-deep); color: var(--bg); }
.nav-dd-item.current { color: var(--phosphor); pointer-events: none; }

/* ---- file header ---- */
.file-header {
  margin-top: 40px;
  border: 1px solid var(--ink);
  background: var(--panel);
  position: relative;
}
.file-header::before {
  content: "";
  position: absolute; top: 8px; left: 8px; right: 8px; bottom: 8px;
  border: 1px dashed var(--sage);
  pointer-events: none;
  z-index: 0;
}

.hero { padding: 40px 32px 44px; position: relative; z-index: 1; }
.eyebrow {
  font-size: 10.5px;
  letter-spacing: 0.08em;
  color: var(--teal);
  margin-bottom: 16px;
}
.eyebrow-back {
  display: inline-flex;
  align-items: center;
  text-decoration: none;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink);
  border: 1px solid var(--ink);
  padding: 3px 9px;
  transition: background 0.15s, color 0.15s;
  vertical-align: middle;
  margin-right: 10px;
}
.eyebrow-back:hover { background: var(--ink); color: var(--bg); }
h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: clamp(38px, 6vw, 62px);
  letter-spacing: -0.01em;
  color: var(--teal-deep);
  line-height: 1.02;
}
h1 .cursor {
  display: inline-block;
  width: 0.45ch;
  background: var(--phosphor);
  animation: blink 1s steps(1) infinite;
  margin-left: 3px;
  vertical-align: text-bottom;
}
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

.role-line {
  margin-top: 18px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(14px, 1.8vw, 18px);
  color: var(--ink);
  display: flex;
  flex-wrap: wrap;
  gap: 8px 14px;
  align-items: baseline;
}
.role-line .sep { color: var(--sage); }
.role-line .count { color: var(--teal); }

.hero-divider {
  margin-top: 28px;
  height: 1px;
  background: repeating-linear-gradient(90deg, var(--ink) 0 5px, transparent 5px 10px);
  opacity: 0.4;
}

/* ---- section label ---- */
.section-label {
  margin: 52px 0 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 10.5px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--teal-deep);
}
.section-label::after {
  content: "";
  flex: 1;
  height: 1px;
  background: var(--ink);
  opacity: 0.4;
}
.section-label .tri { color: var(--phosphor); }

/* ---- cards ---- */
.cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

.card {
  border: 1px solid var(--ink);
  background: var(--card-screen);
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s ease;
  display: flex;
  flex-direction: column;
}
.card:hover { transform: translateY(-3px); }

.card-head {
  padding: 7px 11px;
  font-size: 9.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  border-bottom: 1px solid rgba(183, 207, 194, 0.2);
  color: var(--phosphor);
}

.card-thumb {
  height: 160px;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
.card-thumb img {
  width: 100%; height: 100%;
  object-fit: cover; object-position: center;
  image-rendering: pixelated;
  display: block;
}
.card-icon {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
}
.card-icon i { font-size: 38px; color: var(--phosphor); opacity: 0.4; }

.card-body {
  padding: 14px 13px 16px;
  background: var(--panel);
  color: var(--ink);
  display: flex;
  flex-direction: column;
  flex: 1;
}
.card-title {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  font-size: 15px;
  margin-bottom: 4px;
}
.card-desc {
  font-size: 10.5px;
  color: var(--sage);
  line-height: 1.65;
  flex: 1;
}
.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 8px;
}
.card-tag {
  font-size: 9.5px;
  letter-spacing: 0.06em;
  color: var(--teal);
  text-transform: uppercase;
}
.card-tag + .card-tag::before {
  content: "·";
  margin-right: 4px;
  color: var(--sage);
}

/* ---- lightbox ---- */
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.72);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.lightbox.open { display: flex; }

.lb-box {
  background: var(--panel);
  border: 1px solid var(--ink);
  max-width: 780px;
  width: 100%;
  max-height: calc(100vh - 48px);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}
.lb-box::before {
  content: "";
  position: absolute; top: 8px; left: 8px; right: 8px; bottom: 8px;
  border: 1px dashed var(--sage);
  pointer-events: none;
  z-index: 0;
}

.lb-topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 14px;
  border-bottom: 1px solid rgba(183, 192, 182, 0.3);
  flex-shrink: 0;
  position: relative;
  z-index: 1;
}
.lb-topbar-label {
  font-size: 9.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--phosphor);
}
.lb-close {
  width: 28px; height: 28px;
  border: 1px solid var(--ink);
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink);
  font-size: 14px;
  transition: background 0.12s, color 0.12s;
}
.lb-close:hover { background: var(--ink); color: var(--bg); }

.lb-body {
  overflow-y: auto;
  flex: 1;
  display: flex;
  flex-direction: column;
  position: relative;
  z-index: 1;
}

.lb-img-area {
  position: relative;
  background: var(--card-screen);
  flex-shrink: 0;
  background-image: repeating-linear-gradient(
    0deg,
    rgba(63, 203, 142, 0.04) 0px,
    rgba(63, 203, 142, 0.04) 1px,
    transparent 1px,
    transparent 3px
  );
}
.lb-img-area img {
  width: 100%;
  display: block;
  image-rendering: pixelated;
  max-height: 58vh;
  object-fit: contain;
  opacity: 0.88;
}

.lb-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 34px; height: 34px;
  border: 1px solid var(--phosphor-dim);
  background: rgba(14, 51, 46, 0.88);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--phosphor);
  font-size: 15px;
  transition: background 0.12s, border-color 0.12s;
}
.lb-arrow:hover { background: var(--teal-deep); border-color: var(--phosphor); }
.lb-arrow.hidden { opacity: 0; pointer-events: none; }
.lb-prev { left: 10px; }
.lb-next { right: 10px; }

.lb-info {
  padding: 18px 22px 22px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  background: var(--panel);
}
.lb-title {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  font-size: 18px;
  color: var(--teal-deep);
}
.lb-desc {
  font-size: 10.5px;
  color: var(--sage);
  line-height: 1.65;
}
.lb-counter {
  font-size: 9.5px;
  letter-spacing: 0.1em;
  color: var(--phosphor);
}
.lb-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.lb-tag {
  font-size: 9.5px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--teal);
}
.lb-tag + .lb-tag::before {
  content: "·";
  margin-right: 4px;
  color: var(--sage);
}
.lb-about {
  font-size: 10.5px;
  color: var(--ink);
  line-height: 1.8;
  padding-top: 12px;
  border-top: 1px solid rgba(183, 192, 182, 0.3);
}

footer {
  margin-top: 64px;
  padding-top: 16px;
  border-top: 1px solid var(--ink);
  display: flex;
  justify-content: space-between;
  font-size: 9.5px;
  letter-spacing: 0.1em;
  color: var(--sage);
}

/* ---- dark mode ---- */
body.dark {
  --bg: #0C1F1B;
  --panel: #112920;
  --ink: #B7C9C0;
  --teal-deep: #3FCB8E;
  --teal: #6BAFA0;
  --sage: #3D6055;
  --line: #1C3530;
  --card-screen: #071310;
}
body.dark .file-header { background: var(--panel); border-color: #2A4A40; }
body.dark .file-header::before { border-color: var(--sage); }
body.dark h1 { color: var(--teal-deep); }
body.dark .topbar { border-color: #2A4A40; }
body.dark .nav-dropdown { background: var(--panel); border-color: #2A4A40; }
body.dark .nav-dd-item { color: var(--ink); }
body.dark .nav-dd-item:hover { background: #1D4A3A; color: #EDEAE2; }
body.dark .card-body { background: var(--panel); }
body.dark footer { border-color: #2A4A40; }
body.dark .card { border-color: #2A4A40; }
body.dark .lb-box { background: var(--panel); border-color: #2A4A40; }
body.dark .lb-box::before { border-color: var(--sage); }
body.dark .lb-info { background: var(--panel); }
body.dark .lb-title { color: var(--teal-deep); }
body.dark .lb-about { color: var(--ink); border-top-color: #2A4A40; }

/* ---- mobile ---- */
@media (max-width: 768px) {
  .frame { padding: 0 20px 60px; }
  .hero { padding: 26px 18px 30px; }
  .cards { grid-template-columns: 1fr; }
  .topbar-btn { font-size: 9.5px; padding: 4px 8px; }
  .lightbox { padding: 12px; }
  .lb-img-area img { max-height: 50vh; }
}
@media (max-width: 1024px) and (min-width: 769px) {
  .cards { grid-template-columns: repeat(2, 1fr); }
}

.jp-loading .main { visibility: hidden; }
</style>
</head>

<script>
(function(){
  var dark = localStorage.getItem('sw_dark') === '1';
  var jp   = localStorage.getItem('sw_jp')   === '1';

  function applyLang(){
    var btn = document.getElementById('topbar-lang-btn');
    if(btn) btn.textContent = jp ? 'English' : '日本語';
    document.documentElement.lang = jp ? 'ja' : 'en';
    if(typeof window.onToggleLangContent === 'function') window.onToggleLangContent(jp);
  }

  window.toggleDark = function(){
    dark = !dark;
    localStorage.setItem('sw_dark', dark ? '1' : '0');
    document.body.classList.toggle('dark', dark);
  };

  window.toggleLang = function(){
    jp = !jp;
    localStorage.setItem('sw_jp', jp ? '1' : '0');
    document.body.dataset.jp = jp ? '1' : '';
    applyLang();
  };

  window.toggleNavDropdown = function(){
    document.getElementById('nav-btn-wrap').classList.toggle('open');
  };
  document.addEventListener('click', function(e){
    if(!e.target.closest('#nav-btn-wrap')){
      var wrap = document.getElementById('nav-btn-wrap');
      if(wrap) wrap.classList.remove('open');
    }
  });

  setTimeout(function(){
    if(jp) applyLang();
    document.body.classList.remove('jp-loading');
  }, 0);
})();
</script>

var _jp = document.body.dataset.jp === '1';
var lbPiece = null;
var lbIdx = 0;

function buildCard(p, idx) {
  var numStr = (idx + 1) < 10 ? '0' + (idx + 1) : '' + (idx + 1);
  var title = (_jp && p.title_ja) ? p.title_ja : p.title;
  var desc  = (_jp && p.desc_ja)  ? p.desc_ja  : p.desc;
  var thumb = p.images && p.images.length
    ? '<img src="' + p.images[0] + '" alt="' + title + '">'
    : '<div class="card-icon"><i class="ti ti-grid-dots"></i></div>';
  var tags = p.tags.map(function(t){ return '<span class="card-tag">' + t + '</span>'; }).join('');
  return '<div class="card" role="button" tabindex="0"'
    + ' onclick="openLightbox(' + idx + ')"'
    + ' onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();openLightbox(' + idx + ')}">'
    + '<div class="card-head">Piece ' + numStr + '</div>'
    + '<div class="card-thumb">' + thumb + '</div>'
    + '<div class="card-body">'
    + '<div class="card-title">' + title + '</div>'
    + '<div class="card-desc">' + desc + '</div>'
    + '<div class="card-tags">' + tags + '</div>'
    + '</div>'
    + '</div>';
}

function renderGrid() {
  document.getElementById('art-grid').innerHTML = ART.map(buildCard).join('');
}

function openLightbox(idx) {
  lbPiece = ART[idx];
  lbIdx = 0;
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function lbOverlayClick(e) {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
}

function lbNavigate(dir) {
  lbIdx = Math.max(0, Math.min(lbPiece.images.length - 1, lbIdx + dir));
  updateLightbox();
}

function updateLightbox() {
  var jp = _jp;
  var title = (jp && lbPiece.title_ja) ? lbPiece.title_ja : lbPiece.title;
  var desc  = (jp && lbPiece.desc_ja)  ? lbPiece.desc_ja  : lbPiece.desc;
  var about = (jp && lbPiece.about_ja) ? lbPiece.about_ja : lbPiece.about;

  document.getElementById('lb-img').src = lbPiece.images[lbIdx];
  document.getElementById('lb-img').alt = title;
  document.getElementById('lb-title').textContent = title;
  document.getElementById('lb-desc').textContent = desc;

  var tagsEl = document.getElementById('lb-tags');
  tagsEl.innerHTML = lbPiece.tags.map(function(t){ return '<span class="lb-tag">' + t + '</span>'; }).join('');

  var aboutEl = document.getElementById('lb-about');
  if (about) {
    aboutEl.textContent = about;
    aboutEl.style.display = '';
  } else {
    aboutEl.style.display = 'none';
  }

  var total = lbPiece.images.length;
  var counterEl = document.getElementById('lb-counter');
  counterEl.textContent = total > 1 ? (lbIdx + 1) + ' / ' + total : '';
  counterEl.style.display = total > 1 ? '' : 'none';

  document.getElementById('lb-prev').classList.toggle('hidden', lbIdx === 0 || total <= 1);
  document.getElementById('lb-next').classList.toggle('hidden', lbIdx === total - 1 || total <= 1);

  var body = document.querySelector('.lb-body');
  if (body) body.scrollTop = 0;
}

document.addEventListener('keydown', function(e) {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft')  lbNavigate(-1);
  if (e.key === 'ArrowRight') lbNavigate(1);
});

renderGrid();

window.onToggleLangContent = function(jp) {
  _jp = jp;
  var h1 = document.getElementById('page-h1');
  h1.childNodes[0].textContent = jp ? 'イラスト・ドット絵' : 'art & pixel art';
  document.getElementById('page-sub').textContent   = jp ? '描いたもの。' : "things i've drawn.";
  document.getElementById('page-count').textContent = jp ? '7件' : '7 pieces';
  document.getElementById('sec-label').textContent  = jp ? 'すべての作品' : 'ALL PIECES';
  document.getElementById('nav-home').textContent    = jp ? 'ホーム' : 'home';
  document.getElementById('nav-works').textContent   = jp ? '制作実績' : 'works';
  document.getElementById('nav-art').textContent     = jp ? 'イラスト' : 'art';
  document.getElementById('nav-about').textContent   = jp ? '自己紹介' : 'about';
  document.getElementById('nav-contact').textContent = jp ? 'お問い合わせ' : 'contact';
  renderGrid();
  if (lbPiece) updateLightbox();
};
</script>
