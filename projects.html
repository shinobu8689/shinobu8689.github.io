<html lang="en">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #EDEAE2;
  --panel: #E4E1D7;
  --ink: #151E1B;
  --teal-deep: #0E332E;
  --teal: #2C685D;
  --sage: #4E6B5D;
  --phosphor: #3FCB8E;
  --line: #B7C0B6;
  --card-screen: #0E332E;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'IBM Plex Mono', monospace;
  background: var(--bg);
  min-height: 100vh;
}

.main {
  min-height: 100vh;
  background-image:
    linear-gradient(var(--line) 1px, transparent 1px),
    linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size: 28px 28px;
  background-attachment: fixed;
  position: relative;
}

.grid-fade {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at 50% 0%, transparent 0%, var(--bg) 72%);
  pointer-events: none;
  z-index: 0;
}

.frame {
  position: relative;
  max-width: 900px;
  width: 100%;
  margin: 0 auto;
  padding: 0 32px 80px;
  z-index: 1;
}

/* ---- topbar ---- */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 0;
  border-bottom: 1px solid var(--ink);
}
.site-mark {
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.06em;
  color: var(--teal-deep);
}
.topbar-controls { display: flex; align-items: center; gap: 8px; }
.topbar-btn {
  background: transparent;
  border: 1px solid var(--ink);
  color: var(--ink);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10.5px;
  letter-spacing: 0.1em;
  padding: 5px 11px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: background 0.15s, color 0.15s;
  line-height: 1;
}
.topbar-btn:hover { background: var(--ink); color: var(--bg); }
.icon-sun { display: none; }
.icon-moon { display: inline; }
body.dark .icon-sun { display: inline; }
body.dark .icon-moon { display: none; }

/* ---- nav dropdown ---- */
.nav-btn-wrap { position: relative; }
.nav-dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 4px);
  right: 0;
  background: var(--panel);
  border: 1px solid var(--ink);
  padding: 4px;
  z-index: 90;
  min-width: 150px;
}
.nav-btn-wrap.open .nav-dropdown { display: block; }
.nav-dd-item {
  display: block;
  padding: 7px 12px;
  font-size: 10.5px;
  color: var(--ink);
  cursor: pointer;
  letter-spacing: 0.06em;
  text-decoration: none;
  white-space: nowrap;
  transition: background 0.1s, color 0.1s;
}
.nav-dd-item:hover { background: var(--teal-deep); color: var(--bg); }
.nav-dd-item.current { color: var(--phosphor); pointer-events: none; }

/* ---- file header ---- */
.file-header {
  margin-top: 40px;
  border: 1px solid var(--ink);
  background: var(--panel);
  position: relative;
}
.file-header::before {
  content: "";
  position: absolute; top: 8px; left: 8px; right: 8px; bottom: 8px;
  border: 1px dashed var(--sage);
  pointer-events: none;
  z-index: 0;
}

.hero { padding: 40px 32px 44px; position: relative; z-index: 1; }
.eyebrow {
  font-size: 10.5px;
  letter-spacing: 0.08em;
  color: var(--teal);
  margin-bottom: 16px;
}
.eyebrow-back {
  display: inline-flex;
  align-items: center;
  text-decoration: none;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink);
  border: 1px solid var(--ink);
  padding: 3px 9px;
  transition: background 0.15s, color 0.15s;
  vertical-align: middle;
  margin-right: 10px;
}
.eyebrow-back:hover { background: var(--ink); color: var(--bg); }
h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: clamp(38px, 6vw, 62px);
  letter-spacing: -0.01em;
  color: var(--teal-deep);
  line-height: 1.02;
}
h1 .cursor {
  display: inline-block;
  width: 0.45ch;
  background: var(--phosphor);
  animation: blink 1s steps(1) infinite;
  margin-left: 3px;
  vertical-align: text-bottom;
}
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

.role-line {
  margin-top: 18px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(14px, 1.8vw, 18px);
  color: var(--ink);
  display: flex;
  flex-wrap: wrap;
  gap: 8px 14px;
  align-items: baseline;
}
.role-line .sep { color: var(--sage); }
.role-line .count { color: var(--teal); }

.hero-divider {
  margin-top: 28px;
  height: 1px;
  background: repeating-linear-gradient(90deg, var(--ink) 0 5px, transparent 5px 10px);
  opacity: 0.4;
}

/* ---- section label ---- */
.section-label {
  margin: 52px 0 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 10.5px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--teal-deep);
}
.section-label::after {
  content: "";
  flex: 1;
  height: 1px;
  background: var(--ink);
  opacity: 0.4;
}
.section-label .tri { color: var(--phosphor); }

/* ---- cards ---- */
.cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

.card {
  border: 1px solid var(--ink);
  background: var(--card-screen);
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s ease;
  display: flex;
  flex-direction: column;
}
.card:hover { transform: translateY(-3px); }
.card:hover .scan { opacity: 1; }

.card-head {
  padding: 7px 11px;
  font-size: 9.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  border-bottom: 1px solid rgba(183, 207, 194, 0.2);
  color: var(--phosphor);
}

.card-thumb {
  height: 148px;
  position: relative;
  overflow: hidden;
  background-image: repeating-linear-gradient(
    0deg,
    rgba(63, 203, 142, 0.05) 0px,
    rgba(63, 203, 142, 0.05) 1px,
    transparent 1px,
    transparent 3px
  );
  flex-shrink: 0;
}
.card-thumb img {
  width: 100%; height: 100%;
  object-fit: cover; object-position: center;
  opacity: 0.7;
  filter: saturate(0.45) brightness(0.75);
  transition: opacity 0.25s, filter 0.25s;
  display: block;
}
.card:hover .card-thumb img {
  opacity: 0.88;
  filter: saturate(0.65) brightness(0.88);
}
.card-icon {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
}
.card-icon i { font-size: 38px; color: var(--phosphor); opacity: 0.4; }
.scan {
  position: absolute; left: 0; right: 0; height: 40%;
  background: linear-gradient(180deg, transparent, rgba(63, 203, 142, 0.15), transparent);
  top: -40%;
  opacity: 0;
  animation: scan 2.8s linear infinite;
  transition: opacity 0.2s;
  pointer-events: none;
}
.phosphor-glow {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 55%, rgba(63, 203, 142, 0.1) 100%);
  pointer-events: none;
}
@keyframes scan { to { top: 100%; } }

.card-body {
  padding: 14px 13px 16px;
  background: var(--panel);
  color: var(--ink);
  display: flex;
  flex-direction: column;
  flex: 1;
}
.card-title {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  font-size: 15px;
  margin-bottom: 4px;
}
.card-desc {
  font-size: 10.5px;
  color: var(--sage);
  line-height: 1.65;
  flex: 1;
}
.card-sub {
  font-size: 9.5px;
  letter-spacing: 0.06em;
  color: var(--teal);
  text-transform: uppercase;
  margin-top: 8px;
}
.card-footer {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid rgba(183, 192, 182, 0.25);
}
.card-link {
  font-size: 9.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--teal);
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 3px;
  transition: color 0.12s;
}
.card-link:hover { color: var(--phosphor); }
.card-link i { font-size: 12px; }

footer {
  margin-top: 64px;
  padding-top: 16px;
  border-top: 1px solid var(--ink);
  display: flex;
  justify-content: space-between;
  font-size: 9.5px;
  letter-spacing: 0.1em;
  color: var(--sage);
}

/* ---- dark mode ---- */
body.dark {
  --bg: #0C1F1B;
  --panel: #112920;
  --ink: #B7C9C0;
  --teal-deep: #3FCB8E;
  --teal: #6BAFA0;
  --sage: #8AAE9E;
  --line: #1C3530;
  --card-screen: #071310;
}
body.dark .file-header { background: var(--panel); border-color: #2A4A40; }
body.dark .file-header::before { border-color: var(--sage); }
body.dark h1 { color: var(--teal-deep); }
body.dark .topbar { border-color: #2A4A40; }
body.dark .card-body { background: var(--panel); }
body.dark footer { border-color: #2A4A40; }
body.dark .card { border-color: #2A4A40; }
body.dark .nav-dropdown { background: var(--panel); border-color: #2A4A40; }
body.dark .nav-dd-item { color: var(--ink); }
body.dark .nav-dd-item:hover { background: #1D4A3A; color: #EDEAE2; }

/* ---- mobile ---- */
@media (max-width: 768px) {
  .frame { padding: 0 20px 60px; }
  .hero { padding: 26px 18px 30px; }
  .cards { grid-template-columns: 1fr; }
  .topbar-btn { font-size: 9.5px; padding: 4px 8px; }
}
@media (max-width: 1024px) and (min-width: 769px) {
  .cards { grid-template-columns: repeat(2, 1fr); }
}

.jp-loading .main { visibility: hidden; }
</style>
</head>

<div class="main">

  <div class="frame">

    <div class="topbar">
      <span class="site-mark">shinobu_works</span>
      <div class="topbar-controls">
        <div class="nav-btn-wrap" id="nav-btn-wrap">
          <button class="topbar-btn" onclick="toggleNavDropdown()">
            <i class="ti ti-layout-grid"></i><span>site</span>
          </button>
          <div class="nav-dropdown">
            <a class="nav-dd-item" href="index.html" id="nav-home">home</a>
            <a class="nav-dd-item current" href="projects.html" id="nav-works">works</a>

        <button class="topbar-btn" onclick="toggleDark()">

      </div>

    <div class="file-header">
      <div class="hero">
        <div class="eyebrow"><a class="eyebrow-back" href="index.html">← back</a>shinobu_works/projects</div>

        <div class="role-line">

      </div>

    <div class="section-label">
      <span class="tri">▸</span>
      <span id="sec-label">ALL PROJECTS</span>
    </div>

    <div class="cards" id="projects-grid"></div>

    <footer>
      <span>© 2026 All rights reserved.</span>
      <span>shinobu_works</span>
    </footer>

  </div>
</div>

<script>
(function(){
  var dark = localStorage.getItem('sw_dark') === '1';
  var jp   = localStorage.getItem('sw_jp')   === '1';

  function applyLang(){
    var btn = document.getElementById('topbar-lang-btn');
    if(btn) btn.textContent = jp ? 'English' : '日本語';
    document.documentElement.lang = jp ? 'ja' : 'en';
    if(typeof window.onToggleLangContent === 'function') window.onToggleLangContent(jp);
  }

  window.toggleDark = function(){
    dark = !dark;
    localStorage.setItem('sw_dark', dark ? '1' : '0');
    document.body.classList.toggle('dark', dark);
  };

  window.toggleLang = function(){
    jp = !jp;
    localStorage.setItem('sw_jp', jp ? '1' : '0');
    document.body.dataset.jp = jp ? '1' : '';
    applyLang();
  };

  window.toggleNavDropdown = function(){
    document.getElementById('nav-btn-wrap').classList.toggle('open');
  };

  document.addEventListener('click', function(e){
    if(!e.target.closest('#nav-btn-wrap')){
      var wrap = document.getElementById('nav-btn-wrap');
      if(wrap) wrap.classList.remove('open');
    }
  });

  setTimeout(function(){
    if(jp) applyLang();
    document.body.classList.remove('jp-loading');
  }, 0);
})();
</script>

<script>
var PROJECTS=[
  {
    icon:'ti-clipboard-text',
    image:'project_images/clipboardlm1.png',
    title:'ClipboardLM',
    title_ja:'ClipboardLM',
    desc:'Windows clipboard manager that auto-tags and summarizes captures with a local Ollama model, with hotkey capture and tag rollup reports.',
    desc_ja:'ローカルのOllamaモデルが自動でタグ付け・要約するWindows向けクリップボード管理アプリ。ホットキー取得とタグ別まとめレポートを搭載。',
    tags:['c#','wpf','ef core','ollama'],
    github:'https://github.com/shinobu8689/ClipboardLM',
    href:'projects/clipboard-lm.html'
  },
  {
    icon:'ti-robot',
    image:'project_images/jobexpress.png',
    title:'Job Stream Express',
    title_ja:'Job Stream Express',
    desc:'Automated job search and eligibility comparison tool. AI-powered analysis for both Japanese and English job sites.',
    desc_ja:'求人検索・適性分析・応募支援を自動化したワークフロー支援ツール。日英両対応のAI分析機能を搭載。',
    tags:['python','playwright','ollama','gemma4'],
    github:'https://github.com/shinobu8689/JobStreamExpress',
    href:'projects/job-stream-express.html'
  },
  {
    icon:'ti-photo-edit',
    image:'project_images/imagedit.png',
    title:'Image Edit Pipeline',
    title_ja:'Image Edit Pipeline',
    desc:'Workflow-driven image editor with batch processing, background removal, and watermarking via a web UI and CLI.',
    desc_ja:'ウォーターマークや背景除去などをバッチ処理できるワークフロー型画像編集ツール。WebとCLIの両方に対応。',
    tags:['python','fastapi','pillow','rembg'],
    github:'https://github.com/shinobu8689/ImageEditPipeline',
    href:'projects/image-edit-pipeline.html'
  },
  {
    icon:'ti-train',
    image:'project_images/nexttrain.png',
    title:'Next Train',
    title_ja:'Next Train',
    desc:'Real-time Melbourne train dashboard using GTFS-RT and PTV data with delay visualisation and data validity control.',
    desc_ja:'GTFSとPTVデータを使ったメルボルン列車のリアルタイム運行ダッシュボード。遅延情報とデータ有効性管理を搭載。',
    tags:['python','fastapi','sqlite','gtfs-rt'],
    github:'https://github.com/shinobu8689/NextTrainDashboard',
    href:'projects/next-train.html'
  },
  {
    icon:'ti-device-desktop',
    image:'project_images/stormworkspc.jpg',
    title:'StormworksPC',
    title_ja:'StormworksPC',
    desc:'Custom in-game OS for Stormworks with a modular app architecture, snap-based GUI, and 7 pre-installed apps.',
    desc_ja:'Stormworks内で動作するカスタムOS。モジュール型アーキテクチャ・スナップUI・7つのプリインストールアプリを搭載。',
    tags:['lua','stormworks engine'],
    github:null,
    href:'projects/stormworks-pc.html'
  },
  {
    icon:'ti-layout-grid',
    title:'shinobu_works',
    title_ja:'shinobu_works',

    desc_ja:'ダークモードと日英切替に対応したミニマルデザインのポートフォリオサイト。',
    tags:['html','css','javascript'],
    github:null,
    href:'projects/shinobu-works.html'
  },
  {
    icon:'ti-stack-2',
    title:'Misc Projects',
    title_ja:'その他のプロジェクト',
    desc:"Kanban Board, Nine Men's Morris, Sleep Medication App — team exercises and personal experiments.",
    desc_ja:"Kanban Board・ナイン・メンズ・モリス・睡眠補助アプリ — チーム開発と個人実験のまとめ。",
    tags:['javascript','python','lua','java'],
    github:null,
    href:'projects/misc.html'
  }
];

function buildCard(p, jp, num){
  var title = jp&&p.title_ja ? p.title_ja : p.title;
  var desc  = jp&&p.desc_ja  ? p.desc_ja  : p.desc;
  var tags  = p.tags.join(' · ');
  var numStr = num < 10 ? '0'+num : ''+num;
  var footer = '';
  if(p.github){
    footer = '<div class="card-footer">'
      +'<a class="card-link" href="'+p.github+'" target="_blank" onclick="event.stopPropagation()">'
      +'github <i class="ti ti-arrow-up-right"></i></a>'
      +'</div>';
  }
  var thumb = p.image
    ? '<img src="'+p.image+'" alt="'+title+'"><div class="scan"></div><div class="phosphor-glow"></div>'
    : '<div class="card-icon"><i class="ti '+p.icon+'"></i></div><div class="scan"></div><div class="phosphor-glow"></div>';
  var clickAttr = p.href ? ' onclick="location.href=\''+p.href+'\'"' : '';
  return '<div class="card"'+clickAttr+'>'
    +'<div class="card-head">Project '+numStr+'</div>'
    +'<div class="card-thumb">'+thumb+'</div>'
    +'<div class="card-body">'
    +'<div class="card-title">'+title+'</div>'
    +'<div class="card-desc">'+desc+'</div>'
    +'<div class="card-sub">'+tags+'</div>'
    +footer
    +'</div>'
    +'</div>';
}

function renderGrid(jp){
  document.getElementById('projects-grid').innerHTML = PROJECTS.map(function(p, i){
    return buildCard(p, jp, i+1);
  }).join('');
}

renderGrid(false);

window.onToggleLangContent = function(jp){
  var h1 = document.getElementById('page-h1');
  h1.childNodes[0].textContent = jp ? '制作実績' : 'all projects';
  document.getElementById('page-sub').textContent   = jp ? '作ったもの。' : "things i've built.";
  document.getElementById('page-count').textContent = jp ? '7件' : '7 projects';
  document.getElementById('sec-label').textContent  = jp ? 'すべてのプロジェクト' : 'ALL PROJECTS';
  document.getElementById('nav-home').textContent    = jp ? 'ホーム' : 'home';
  document.getElementById('nav-works').textContent   = jp ? '制作実績' : 'works';
  document.getElementById('nav-art').textContent     = jp ? 'イラスト' : 'art';
  document.getElementById('nav-about').textContent   = jp ? '自己紹介' : 'about';
  document.getElementById('nav-contact').textContent = jp ? 'お問い合わせ' : 'contact';
  renderGrid(jp);
};
</script>
